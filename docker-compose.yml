services:

  db:
    image: postgres:16
    container_name: hireflow_db
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data  

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -h localhost -p 5432"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  migrate:
    image: migrate/migrate
    container_name: hireflow_migrate

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database", "${DB_DSN}",
        "up"
      ]      
    restart: "no"  

  seed:
    build: .
    container_name: hireflow_seed

    env_file:
      - .env

    command: ["./hireflow_seed"]

    depends_on:
      migrate:
        condition: service_completed_successfully

    environment:
      - DB_DSN=${DB_DSN}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}

    restart: "no"      

  api: 
    build: .
    container_name: hireflow_api

    env_file:
      - .env

    depends_on:
      seed:
        condition: service_completed_successfully 
    
    environment:
      DB_DSN: ${DB_DSN}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT}

    ports:
      - "8080:8080"    

    restart: "unless-stopped"
      
volumes:
    postgres_data:
