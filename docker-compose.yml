version: "3.9"

services:

  db:
    image: postgres:16
    container_name: hireflow_db
    restart: always
    environment:
      POSTGRES_USER: DB_USER
      POSTGRES_PASSWORD: DB_PASSWORD
      POSTGRES_DB: DB_NAME
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data  

migrate: 
  image: migrate/migrate

  depends_on:
    - db
  
  volumes:
    - ./migrations:/migrations

  command:
    [
      "-path",
      "/migrations",
      "-database",
      "postgres://DB_DSN",
      "up"
    ]  

api: 
  build: .
  container_name: hireflow_api
  depends_on:
    - db
    - migrate
  environment:
    - DB_USER=DB_USER
    - DB_PASSWORD=DB_PASSWORD
    - DB_HOST=DB_HOST
    - DB_PORT=5432
    - DB_NAME=DB_NAME
    - DB_DSN=DB_DSN
    - JWT_SECRET=JWT_SECRET
    - PORT=8080
  ports:
    - "8080:8080"    
  restart: always

volumes:
  postgres_data:
